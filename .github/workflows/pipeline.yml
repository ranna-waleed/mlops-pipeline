# .github/workflows/pipeline.yml
name: ML Validation and Deployment Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allows manual triggering from GitHub UI

jobs:
  # JOB 1: VALIDATE
  validate:
    name: Train & Validate Model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure DVC remote credentials
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}

      - name: Pull data with DVC
        run: dvc pull

      - name: Train model and log to MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: python train.py

      - name: Upload model_info.txt as artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  # JOB 2: DEPLOY
  deploy:
    name: Check Threshold & Deploy
    runs-on: ubuntu-latest
    needs: validate   # Only runs if validate succeeds

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download model_info.txt artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Check accuracy threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: python check_threshold.py

      - name: Mock Docker Build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
          docker build \
            --build-arg RUN_ID=$(cat model_info.txt) \
            -t mlops-model:$(cat model_info.txt) \
            .
          echo " Docker image built successfully!"
